# Endora v1.6.12

# Arm above head + wrist gestures
# Tuned for wall-mounted Reolink fisheye with internal dewarping.

rtsp_url_a: "rtsp://admin:rarcy1-hyfder-bubvuK@10.0.0.178:554/h264Preview_01_sub"
rtsp_url_b: "rtsp://admin:rarcy1-hyfder-bubvuK@10.0.0.178:554/h264Preview_01_sub"
rtsp_transport: tcp
rtsp_reconnect_delay_s: 5.0
frame_width: 640
frame_height: 480

# Pose — use complexity 2 for best detection at ~12 ft distance
pose_model_complexity: 2
pose_min_detection_confidence: 0.3
pose_min_tracking_confidence: 0.3

# Arm-raise threshold: wrist Y must be below this fraction of frame height.
# With dewarped flat image and user sitting, 0.80 gives generous headroom.
# Lower this (e.g. 0.70) if sitting triggers false positives.
arm_above_head_tolerance: 0.80

# Hands — gesture classification
hand_model_max_hands: 1
hand_min_detection_confidence: 0.3
hand_min_tracking_confidence: 0.1
palm_orientation_threshold: 0.05

# Velocity thresholds — lowered from 25 to catch waves from the sofa.
# The debug page pvx readout will tell you the actual values you're producing.
wave_velocity_threshold_px: 15.0
wave_sustain_frames: 1
vertical_velocity_threshold_px: 15.0
vertical_sustain_frames: 1
fist_curl_threshold: 0.75

# Crop — disable once defisheye is on (flat image fills the frame cleanly).
# Re-enable with frame_crop_top: 55 if still using circular fisheye.
# frame_crop_top: 55

cooldown_s: 2.0
fusion_agreement_window_s: 1.0
ha_event_name: gesture_detected
log_level: debug
debug_port: 8765

# ── Internal fisheye dewarping ────────────────────────────────────────────
# Switch dewarp_enable to true AND switch your RTSP URL to the RAW fisheye
# stream (set the Reolink camera to "Fisheye" mode, not "Defisheye").
# The dewarping happens entirely inside Endora — no Reolink app needed.
#
# Tuning workflow:
#  1. Enable dewarp, restart the add-on.
#  2. Open the debug page — you should see a flat perspective view.
#  3. Adjust dewarp_tilt until the floor/ceiling split looks right.
#  4. Adjust dewarp_pan if you need to shift left/right.
#  5. Lower dewarp_vfov if you want less wide-angle distortion at the edges.
#
dewarp_enable: false
dewarp_fov: 180.0        # total lens FOV in degrees (Reolink FE = 180)
dewarp_pan: 0.0          # + = right, - = left  (degrees)
dewarp_tilt: 30.0        # + = down toward floor, - = upward. Start at 30-50.
dewarp_roll: 0.0         # levels a tilted horizon. If scene leans right use negative.
dewarp_vfov: 75.0        # virtual camera FOV — wider = more room visible
dewarp_out_width: 640
dewarp_out_height: 480
# dewarp_cx: -1          # fisheye circle centre X (default = frame centre)
# dewarp_cy: -1          # fisheye circle centre Y (default = frame centre)

# Night-vision / low-light enhancement (CLAHE).
# Enable this when IR night vision makes pose detection unreliable.
# The debug page will show the enhanced frame so you can see what MediaPipe sees.
# Raise low_light_clip (e.g. 3.0) for very dark scenes.
low_light_enhance: true
low_light_clip: 2.0
