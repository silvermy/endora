# Endora v1.7.0
# ── Essential settings ───────────────────────────────────────────────────────
# These mirror the add-on Configuration tab.
# After saving from the debug page, values are written here AND to
# /data/options.json so they survive add-on restarts.

rtsp_url_a: "rtsp://admin:rarcy1-hyfder-bubvuK@10.0.0.178:554/h264Preview_01_sub"
rtsp_url_b: "rtsp://admin:rarcy1-hyfder-bubvuK@10.0.0.178:554/h264Preview_01_sub"
debug_port: 8765
log_level: debug
ha_event_name: gesture_detected

# How far above the shoulder the wrist must be (normalised frame height).
# For a frontal camera a simple wrist-vs-shoulder check is used.
# 0.05 = wrist must be 5% of frame height above shoulder (good default)
# 0.02 = more permissive; 0.10 = stricter
arm_above_head_tolerance: 0.05

# Body-upright filter: hips must be this far below shoulders (frame fraction).
# Blocks arm-raise detection when lying on a couch or bed.
# When upright, hips are 0.2–0.4 below shoulders; when horizontal they converge.
# 0.10 = hips must be at least 10% of frame height below shoulders.
# Lower toward 0.05 only if detection fails while seated with legs raised.
body_upright_min: 0.10

# Minimum peak wrist velocity (pixels) required to register a wave.
# Watch the pvx value on the debug page while waving to calibrate.
wave_velocity_threshold_px: 8.0

# How many consecutive frames the gesture must appear before firing.
# Higher = fewer false positives but slightly more latency.
# wave_sustain_frames removed — gestures fire on the first confirmed frame

# 0.75 = 3 of 4 fingers must be curled to count as a fist.
fist_curl_threshold: 0.75

# Reverse left/right gesture interpretation (for cameras facing you).
mirror_camera: true

# Minimum pause between fired gestures (seconds).
cooldown_s: 2.0

# Night-vision / IR enhancement.
low_light_enhance: true

# ── Fisheye dewarping ─────────────────────────────────────────────────────────
# Enable this when using the raw fisheye RTSP stream (no in-camera dewarping).
# Set the Reolink camera to "Fisheye" mode in the app, then tune tilt/pan/roll.
dewarp_enable: true
dewarp_fov: 180.0        # total lens FOV in degrees
dewarp_tilt: 30.0        # + = down toward floor
dewarp_pan: 5.0          # + = right, - = left
dewarp_roll: 0.0         # levels a tilted horizon (+ = CW, - = CCW)
dewarp_vfov: 50.0        # vertical FOV of output (narrower = more zoomed in)
dewarp_out_width: 1920   # wider = more horizontal FOV
dewarp_out_height: 480

# ── Advanced (rarely needed — leave at defaults unless you know why) ──────────

# Furniture filter — uses MediaPipe landmark visibility (0–1 confidence).
# Real body landmarks score well even from overhead; furniture near 0.
# 0.35 rejects false detections without blocking the person.
# Raise toward 0.5 if the table keeps winning; lower toward 0.2 if you
# are being rejected (watch the logs for "pose rejected: avg_torso_visibility").
pose_visibility_min: 0.35

# Crop bottom of frame (%) — removes the coffee table area entirely.
# 15 is a good starting point; only increase if the table still appears.
frame_crop_bottom: 15

pose_model_complexity: 1          # 0=fastest 1=balanced 2=most accurate (max)
# pose_min_detection_confidence: 0.3
# pose_min_tracking_confidence: 0.3
# hand_min_detection_confidence: 0.3
# hand_min_tracking_confidence: 0.1
# Minimum single-frame swing in 2D hand_roll to register a snap.
# hand_roll = (index_mcp.x − pinky_mcp.x) / hand_width, ranges ±1.
# A full palm flip produces a swing of ~0.8–1.2.
# 0.40 catches deliberate snaps. Lower = more sensitive.
palm_twist_threshold: 0.40
# palm_orientation_threshold: 0.05
# vertical_velocity_threshold_px: 20.0
# fusion_agreement_window_s: 1.0
# rtsp_transport: tcp
# frame_width: 640
# frame_height: 640
