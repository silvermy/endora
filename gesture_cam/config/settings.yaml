# Gesture Cam v1.3.0
# Arm above head + wrist gestures

rtsp_url_a: "rtsp://admin:YOUR_PASSWORD@10.0.0.178:554/h264Preview_01_sub"
rtsp_url_b: "rtsp://admin:YOUR_PASSWORD@10.0.0.178:554/h264Preview_01_sub"
rtsp_transport: tcp
rtsp_reconnect_delay_s: 5.0
frame_width: 640
frame_height: 640

# Pose — arm raise detection
pose_model_complexity: 1
pose_min_detection_confidence: 0.4
pose_min_tracking_confidence: 0.4
# Wrist must be this far ABOVE shoulder (negative = above shoulder).
# Resting arms: diff +0.05 to +0.15. Raised arm: diff -0.05 to -0.25.
# -0.10 requires a clear raise without needing full overhead extension.
arm_above_head_tolerance: 0.855

# Hands — gesture classification
hand_model_max_hands: 1
hand_min_detection_confidence: 0.3
hand_min_tracking_confidence: 0.1
# Wrist bend sensitivity for palm up/down
palm_orientation_threshold: 0.05

# Velocity thresholds
wave_velocity_threshold_px: 25.0
wave_sustain_frames: 1
vertical_velocity_threshold_px: 20.0
vertical_sustain_frames: 1
fist_curl_threshold: 0.65

cooldown_s: 2.0
fusion_agreement_window_s: 1.0
ha_event_name: gesture_detected
log_level: debug
