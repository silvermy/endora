# gesture_cam/config/settings.yaml
#
# This file is used for LOCAL DEVELOPMENT only (mounted into the container
# at /data/settings.yaml).
#
# In production (HA add-on), all settings come from the add-on UI
# which writes them to /data/options.json — you do NOT edit this file
# on a running HA instance.

rtsp_url_a: "rtsp://admin:password@192.168.1.100:554/stream1"
rtsp_url_b: "rtsp://admin:password@192.168.1.101:554/stream1"
rtsp_transport: tcp
rtsp_reconnect_delay_s: 5.0

frame_width: 640
frame_height: 480

pose_model_complexity: 0
pose_min_detection_confidence: 0.6
pose_min_tracking_confidence: 0.5

arm_raised_wrist_above_shoulder_frac: -0.15
wave_velocity_threshold_px: 18.0
wave_sustain_frames: 3
vertical_velocity_threshold_px: 15.0
vertical_sustain_frames: 3
fist_curl_threshold: 0.65
cooldown_s: 1.2
fusion_agreement_window_s: 0.5

ha_event_name: gesture_detected
log_level: info
