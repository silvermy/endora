# Gesture Cam v1.2.0 — hands-only detection
# Works sitting, standing, or laying down.
# Hand just needs to be visible in frame.

rtsp_url_a: "rtsp://admin:password@192.168.1.100:554/stream1"
rtsp_url_b: "rtsp://admin:password@192.168.1.101:554/stream1"
rtsp_transport: tcp
rtsp_reconnect_delay_s: 5.0

frame_width: 640
frame_height: 480

# MediaPipe Hands
hand_model_max_hands: 1
hand_min_detection_confidence: 0.5
hand_min_tracking_confidence: 0.5

# Gesture thresholds
# A deliberate wrist flick hits 20-40 px/frame.
# Normal hand movement while sitting is under 5 px/frame.
# Start at 15 — lower to 10 if not triggering, raise to 20 if false triggers.
wave_velocity_threshold_px: 15.0
wave_sustain_frames: 1
vertical_velocity_threshold_px: 15.0
vertical_sustain_frames: 1
fist_curl_threshold: 0.65

cooldown_s: 2.0
fusion_agreement_window_s: 1.0

ha_event_name: gesture_detected
log_level: info
